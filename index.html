<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --primary: #27ae60; --dark: #2c3e50; --light: #f4f4f9; }
    body { font-family: sans-serif; background: var(--light); padding: 15px; margin: 0; box-sizing: border-box; }
    
    /* Install Button UI */
    .install-btn {
      background: var(--dark);
      color: white;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 15px;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      cursor: pointer;
      display: none; /* Jab tak browser allow na kare, hide rahega */
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .label-text { font-size: 0.8rem; color: #7f8c8d; font-weight: bold; margin-bottom: 8px; display: block; }
    .amount { font-size: 40px; color: var(--dark); font-weight: 900; }

    /* Amount & Spinner Layout */
    .amount-row { display: flex; align-items: center; justify-content: space-between; }
    
    /* Chota Spinner (Right Side Ke Liye) */
    .mini-spinner { 
      width: 25px; 
      height: 25px; 
      border: 4px solid #f3f3f3; 
      border-top: 4px solid var(--primary); 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
      display: none; /* Default hide rahega */
    }

    /* Mobile Perfect Layout Fix */
    .input-row { display: flex; gap: 10px; align-items: center; width: 100%; box-sizing: border-box; }
    input { 
      flex: 1; 
      padding: 20px 15px; 
      font-size: 28px; 
      font-weight: 900; 
      border: 4px solid #e0e0e0; 
      border-radius: 15px; 
      outline: none; 
      min-width: 0; 
      background: #fafafa; 
    }
    .submit-btn { 
      width: 75px; 
      height: 75px; 
      flex-shrink: 0; 
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 50%; 
      font-size: 35px; 
      cursor: pointer; 
      display: flex; align-items: center; justify-content: center;
    }

    /* Popup Design */
    #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
    .loader-box { background: white; padding: 40px; border-radius: 30px; text-align: center; position: relative; width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; }
    .spinner-circle { position: absolute; width: 120px; height: 120px; border: 8px solid #f3f3f3; border-top: 8px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    .tick-icon { font-size: 60px; color: var(--primary); display: none; } /* Tick shuru mein hide rahega */
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Install Button Yahan Add Kiya Gaya Hai -->
  <button id="installBtn" class="install-btn">📲 App Install Karein</button>

  <div class="card" style="border-left: 8px solid var(--primary);">
    <span class="label-text">IS MAHINE KA KHARCH</span>
    <div class="amount-row">
      <div id="currTotal" class="amount">₹0</div>
      <div id="currSpinner" class="mini-spinner"></div>
    </div>
  </div>
  <div class="card">
    <span class="label-text">PICHHLA MAHINA</span>
    <div class="amount-row">
      <div id="prevTotal" class="amount" style="font-size: 25px; color: #7f8c8d;">₹0</div>
      <div id="prevSpinner" class="mini-spinner"></div>
    </div>
  </div>
  <div class="card">
    <span class="label-text">AMOUNT DALEIN</span>
    <div class="input-row">
      <input type="number" id="amtInput" placeholder="0" pattern="\d*">
      <button class="submit-btn" onclick="addExpense()">✓</button>
    </div>
  </div>

  <div id="popup">
    <div class="loader-box">
      <div id="spinner" class="spinner-circle"></div>
      <div id="tick" class="tick-icon">✓</div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLFBvnydll-7DjNcTfoUzblswnm_lP68Dt9ewE9lP9LJ65JMn9h2XhkL3CWw9-SITc/exec"; 

    // --- PWA INSTALLATION LOGIC START ---
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      // Chrome ka default prompt rokein
      e.preventDefault();
      // Event save karein
      deferredPrompt = e;
      // Button user ko dikhayein
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('App install ho gayi');
          installBtn.style.display = 'none'; // Install hone ke baad button chupa dein
        }
        deferredPrompt = null;
      }
    });

    // Agar user ne already pehle se install kar rakha hai
    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
    });
    // --- PWA INSTALLATION LOGIC END ---

    async function updateUI() {
      document.getElementById('currSpinner').style.display = 'block';
      document.getElementById('prevSpinner').style.display = 'block';

      try {
        const res = await fetch(SCRIPT_URL, { cache: "no-cache" });
        const data = await res.json();
        document.getElementById('currTotal').innerText = '₹' + data.current;
        document.getElementById('prevTotal').innerText = '₹' + data.prev;
      } catch(e) {
        console.log("Data load karne me problem aayi", e);
      } finally {
        document.getElementById('currSpinner').style.display = 'none';
        document.getElementById('prevSpinner').style.display = 'none';
      }
    }

    window.onload = () => {
      updateUI();
    };

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === 'visible') {
        updateUI();
      }
    });

    async function addExpense() {
      const amt = document.getElementById('amtInput').value;
      if(!amt) return;
      
      document.getElementById('popup').style.display = 'flex';
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('tick').style.display = 'none';

      try {
        await fetch(SCRIPT_URL, { 
          method: 'POST', 
          mode: 'no-cors', 
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({amount: amt}) 
        });

        await new Promise(resolve => setTimeout(resolve, 1000));
        await updateUI();
        
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('tick').style.display = 'block';

        setTimeout(() => {
          document.getElementById('popup').style.display = 'none';
          document.getElementById('amtInput').value = '';
        }, 1000);

      } catch(e) {
        alert("Internet connection check karein!");
        document.getElementById('popup').style.display = 'none';
      }
    }
  </script>
</body>
</html>
