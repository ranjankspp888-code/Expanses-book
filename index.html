<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --primary: #27ae60; --dark: #2c3e50; --light: #f4f4f9; }
    body { font-family: sans-serif; background: var(--light); padding: 15px; margin: 0; box-sizing: border-box; }
    
    /* Splash Screen */
    #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; color: white; font-size: 24px; font-weight: bold; }
    
    /* Install Button UI */
    .install-btn {
      background: var(--dark);
      color: white;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 15px;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      cursor: pointer;
      display: none; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .label-text { font-size: 0.8rem; color: #7f8c8d; font-weight: bold; margin-bottom: 8px; display: block; }
    .amount { font-size: 40px; color: var(--dark); font-weight: 900; }

    /* Speaker Button UI */
    .speaker-btn {
      background: none;
      border: none;
      font-size: 28px;
      margin-left: 10px;
      cursor: pointer;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .speaker-btn:active { background: #e0e0e0; }

    .amount-row { display: flex; align-items: center; justify-content: space-between; }
    .amount-wrapper { display: flex; align-items: center; } 
    
    .mini-spinner { 
      width: 25px; 
      height: 25px; 
      border: 4px solid #f3f3f3; 
      border-top: 4px solid var(--primary); 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
      display: none; 
    }

    .input-row { display: flex; gap: 10px; align-items: center; width: 100%; box-sizing: border-box; }
    input { 
      flex: 1; 
      padding: 20px 15px; 
      font-size: 28px; 
      font-weight: 900; 
      border: 4px solid #e0e0e0; 
      border-radius: 15px; 
      outline: none; 
      min-width: 0; 
      background: #fafafa; 
    }
    .submit-btn { 
      width: 75px; 
      height: 75px; 
      flex-shrink: 0; 
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 50%; 
      font-size: 35px; 
      cursor: pointer; 
      display: flex; align-items: center; justify-content: center;
    }

    #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
    .loader-box { background: white; padding: 40px; border-radius: 30px; text-align: center; position: relative; width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; }
    .spinner-circle { position: absolute; width: 120px; height: 120px; border: 8px solid #f3f3f3; border-top: 8px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    .tick-icon { font-size: 60px; color: var(--primary); display: none; } 
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="splash">Expense Tracker...</div>

  <button id="installBtn" class="install-btn">📲 App Install Karein</button>

  <div class="card" style="border-left: 8px solid var(--primary);">
    <span class="label-text">IS MAHINE KA KHARCH</span>
    <div class="amount-row">
      <div class="amount-wrapper">
        <div id="currTotal" class="amount">₹0</div>
        <button class="speaker-btn" onclick="speakText(document.getElementById('currTotal').innerText.replace('₹', '') + ' रुपये')" title="Amount Suno">🔊</button>
      </div>
      <div id="currSpinner" class="mini-spinner"></div>
    </div>
  </div>
  
  <div class="card">
    <span class="label-text">PICHHLA MAHINA</span>
    <div class="amount-row">
      <div id="prevTotal" class="amount" style="font-size: 25px; color: #7f8c8d;">₹0</div>
      <div id="prevSpinner" class="mini-spinner"></div>
    </div>
  </div>
  
  <div class="card">
    <span class="label-text">AMOUNT DALEIN</span>
    <div class="input-row">
      <input type="number" id="amtInput" placeholder="0" pattern="\d*" oninput="speakInput()">
      <button class="submit-btn" onclick="addExpense()">✓</button>
    </div>
  </div>

  <div id="popup">
    <div class="loader-box">
      <div id="spinner" class="spinner-circle"></div>
      <div id="tick" class="tick-icon">✓</div>
    </div>
  </div>

  <script>
    // Splash screen logic
    setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 3000);

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLFBvnydll-7DjNcTfoUzblswnm_lP68Dt9ewE9lP9LJ65JMn9h2XhkL3CWw9-SITc/exec"; 

    // --- INSAAN JAISI AAWAZ (NATURAL VOICE) LOGIC ---
    let bestHindiVoice = null;

    function setBestVoice() {
      let voices = window.speechSynthesis.getVoices();
      
      // Pehle Google ki natural Hindi voice dhoondho
      bestHindiVoice = voices.find(voice => voice.lang.includes('hi') && voice.name.includes('Google')) ||
                       voices.find(voice => voice.lang.includes('hi') && (voice.name.includes('Online') || voice.name.includes('Natural'))) ||
                       voices.find(voice => voice.lang.includes('hi')); 
    }

    // Jab browser voices load kar le tab humari setting apply ho
    if ('speechSynthesis' in window) {
      setBestVoice();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = setBestVoice;
      }
    }

    function speakText(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // Purani aawaz turant roko
        
        let speech = new SpeechSynthesisUtterance(text);
        
        // Agar acchi wali aawaz mil gayi toh use set karo
        if (bestHindiVoice) {
          speech.voice = bestHindiVoice;
        }
        
        speech.lang = 'hi-IN';
        speech.rate = 0.85; // Speed thodi natural rakhi hai
        speech.pitch = 1;   // Normal insaan jaisi pitch
        
        window.speechSynthesis.speak(speech);
      }
    }

    let typingTimer;
    
    function speakInput() {
      clearTimeout(typingTimer);
      const val = document.getElementById('amtInput').value;
      if (val) {
        // Aadhe second ruk kar bolega taaki pura number padh sake
        typingTimer = setTimeout(() => {
          speakText(val + " रुपये");
        }, 600); 
      }
    }
    // ------------------------------------------------

    // --- PWA LOGIC ---
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block'; });
    installBtn.addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; installBtn.style.display = 'none'; } });

    async function updateUI() {
      document.getElementById('currSpinner').style.display = 'block';
      document.getElementById('prevSpinner').style.display = 'block';
      try {
        const res = await fetch(SCRIPT_URL, { cache: "no-cache" });
        const data = await res.json();
        document.getElementById('currTotal').innerText = '₹' + data.current;
        document.getElementById('prevTotal').innerText = '₹' + data.prev;
      } catch(e) { console.log(e); } finally {
        document.getElementById('currSpinner').style.display = 'none';
        document.getElementById('prevSpinner').style.display = 'none';
      }
    }

    window.onload = () => updateUI();

    async function addExpense() {
      const amt = document.getElementById('amtInput').value;
      if(!amt) return;
      document.getElementById('popup').style.display = 'flex';
      try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({amount: amt}) });
        await new Promise(resolve => setTimeout(resolve, 1000));
        await updateUI();
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('tick').style.display = 'block';
        setTimeout(() => { document.getElementById('popup').style.display = 'none'; document.getElementById('amtInput').value = ''; document.getElementById('tick').style.display = 'none'; document.getElementById('spinner').style.display = 'block'; }, 1500);
      } catch(e) { alert("Error!"); document.getElementById('popup').style.display = 'none'; }
    }
  </script>
</body>
</html>
